# Fail2Ban configuration file
# Custom action: add local management notes to ban emails.

[INCLUDES]

before = sendmail-common.conf
         mail-whois-common.conf
         helpers-common.conf

[Definition]

norestored = 1

actionban = ( printf %%b "Subject: [Fail2Ban] <name>: banned <ip> from <fq-hostname>
            Date: `LC_ALL=C date +\"%%a, %%d %%h %%Y %%T %%z\"`
            From: <sendername> <<sender>>
            To: <dest>\n
            Hi,\n
            The IP <ip> has just been banned by Fail2Ban after
            <failures> attempts against <name>.\n\n
            Here is more information about <ip> :\n"
            %(_whois_command)s;
            printf %%b "\nLines containing failures of <ip> (max <grepmax>)\n";
            %(_grep_logs)s;
            printf %%b "\n\nNotes:\n
            - View bans: sudo fail2ban-client status <name>\n
            - Unban IP: sudo fail2ban-client set <name> unbanip <ip>\n
            - List all jails: sudo fail2ban-client status\n\n
            Regards,\n
            Fail2Ban" ) | <mailcmd>

[Init]

name = default
logpath = /dev/null
