# X120x UPS low-battery shutdown settings
# Uses TO/FROM/SUBJECT_PREFIX from /etc/x120x/ups-notify.conf if not set here.

LOW_BATTERY_PCT=20
CHECK_INTERVAL=5
REQUIRE_AC_LOSS=1
DRY_RUN=0

# Quick backup settings
BACKUP_DIR=/mnt/backup/UPS_shutdown_backusp
BACKUP_CMD=/usr/local/sbin/ups-quick-backup.sh
BACKUP_TIMEOUT=300
UPS_BACKUP_PATHS=/etc /home /srv /var/lib /var/www /root
UPS_EXCLUDES_FILE=/etc/restic/excludes.txt
UPS_BACKUP_LOG=/var/log/ups-quick-backup.log

# Stop services before shutdown (space-separated systemd unit names)
STOP_SERVICES=docker.service containerd.service vncserver-x11-serviced.service lightdm.service cups.service cups-browsed.service rp2350-stats.service zerotier-one.service
STOP_TIMEOUT=25

# Optional overrides (defaults to /etc/x120x/ups-notify.conf or Fail2Ban values)
# TO=
# FROM=
# SUBJECT_PREFIX=

LOG_PATH=/var/log/x120x-ups-shutdown.log
STATE_PATH=/run/x120x-ups-shutdown.triggered
