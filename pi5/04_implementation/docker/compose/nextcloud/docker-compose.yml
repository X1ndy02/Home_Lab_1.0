services:
  db:
    image: mariadb:11.4
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    restart: unless-stopped
    volumes:
      - /srv/nextcloud/db:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - /srv/nextcloud/redis:/data

  clamav:
    image: mkodockx/docker-clamav:latest
    restart: unless-stopped
    volumes:
      - clamav-db:/var/lib/clamav
      - /srv/nextcloud/clamav/clamd.conf:/etc/clamav/clamd.conf:ro
      - /srv/nextcloud/clamav/freshclam.conf:/etc/clamav/freshclam.conf:ro

  app:
    image: nextcloud:29-apache
    restart: unless-stopped
    volumes:
      - /srv/nextcloud/app:/var/www/html
    environment:
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_HOST=db
      - REDIS_HOST=redis
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_TRUSTED_DOMAINS}
      - PHP_MEMORY_LIMIT=1024M
      - PHP_UPLOAD_LIMIT=1024M
    depends_on:
      - db
      - redis

  proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /srv/nextcloud/nginx/nextcloud.conf:/etc/nginx/conf.d/default.conf:ro
      - /srv/nextcloud/certs:/etc/nginx/certs:ro
      - /srv/nextcloud/nginx/logs:/var/log/nginx
    depends_on:
      - app

volumes:
  clamav-db:
